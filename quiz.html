// ========== QUIZ ENGINE ==========
let lang = 'ru';
let currentQ = 0;
let correctCount = 0;
let wrongCount = 0;
let locked = false;
let order = [];

function shuffle() {
  order = questions.map((_, i) => i);
  for (let i = order.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [order[i], order[j]] = [order[j], order[i]];
  }
}

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === l.toUpperCase());
  });
  document.getElementById('subtitle').textContent = ui[lang].subtitle;
  document.getElementById('resetBtn').textContent = ui[lang].restart;
  document.getElementById('resultLabel').textContent = ui[lang].resultLabel;
  document.getElementById('labelCorrect').textContent = ui[lang].correct;
  document.getElementById('labelWrong').textContent = ui[lang].wrong;
  document.getElementById('labelPct').textContent = ui[lang].pct;
  resetQuiz();
}

function updateProgress() {
  const answered = correctCount + wrongCount;
  const total = questions.length;
  const pct = Math.round((answered / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent =
    answered + ' ' + ui[lang].of + ' ' + total + '  \u00b7  \u2713 ' + correctCount + '  \u2717 ' + wrongCount;
}

function renderQuestion(idx) {
  const area = document.getElementById('quizArea');
  area.innerHTML = '';
  document.getElementById('results').classList.remove('visible');
  document.getElementById('resetBtn').style.display = 'none';

  if (idx >= questions.length) {
    showFinalResults();
    return;
  }

  const qData = questions[order[idx]];
  const total = questions.length;

  // Section label
  if (qData.section) {
    const sec = document.createElement('div');
    sec.className = 'section-label';
    sec.textContent = qData.section[lang];
    area.appendChild(sec);
  }

  // Card
  const card = document.createElement('div');
  card.className = 'question-card';

  const num = document.createElement('div');
  num.className = 'question-number';
  num.textContent = ui[lang].qOf + ' ' + (idx + 1) + ' / ' + total;
  card.appendChild(num);

  const qText = document.createElement('div');
  qText.className = 'question-text';
  qText.textContent = qData.q[lang];
  card.appendChild(qText);

  const opts = document.createElement('div');
  opts.className = 'options';

  qData.options[lang].forEach((optText, oi) => {
    const opt = document.createElement('div');
    opt.className = 'option';
    opt.innerHTML = '<div class="radio-dot"></div><span>' + optText + '</span>';
    opt.addEventListener('click', () => handleAnswer(card, opt, oi, qData));
    opts.appendChild(opt);
  });

  card.appendChild(opts);

  const expl = document.createElement('div');
  expl.className = 'explanation';
  expl.innerHTML = qData.explanation[lang];
  card.appendChild(expl);

  area.appendChild(card);
  locked = false;
  updateProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function handleAnswer(card, opt, chosen, qData) {
  if (locked) return;
  locked = true;

  opt.classList.add('selected');
  card.querySelectorAll('.option').forEach(o => o.classList.add('disabled'));

  if (chosen === qData.correct) {
    correctCount++;
    card.classList.add('correct');
    opt.classList.add('correct-answer');
  } else {
    wrongCount++;
    card.classList.add('wrong');
    opt.classList.add('wrong-answer');
    card.querySelectorAll('.option')[qData.correct].classList.add('correct-answer');
  }

  card.querySelector('.explanation').classList.add('visible');
  updateProgress();

  const nextBtn = document.createElement('button');
  nextBtn.className = 'btn';
  nextBtn.style.marginTop = '20px';
  nextBtn.style.width = '100%';
  nextBtn.textContent = currentQ < questions.length - 1 ? ui[lang].next : ui[lang].showResult;
  nextBtn.addEventListener('click', () => {
    currentQ++;
    renderQuestion(currentQ);
  });
  card.appendChild(nextBtn);
  nextBtn.focus();
}

function showFinalResults() {
  const total = questions.length;
  const pct = Math.round((correctCount / total) * 100);
  const results = document.getElementById('results');
  results.classList.add('visible');

  const scoreEl = document.getElementById('scoreValue');
  scoreEl.textContent = pct + '%';

  if (pct >= 90) {
    scoreEl.className = 'score excellent';
    document.getElementById('verdict').textContent = ui[lang].excellent;
  } else if (pct >= 70) {
    scoreEl.className = 'score good';
    document.getElementById('verdict').textContent = ui[lang].good;
  } else if (pct >= 50) {
    scoreEl.className = 'score average';
    document.getElementById('verdict').textContent = ui[lang].average;
  } else {
    scoreEl.className = 'score poor';
    document.getElementById('verdict').textContent = ui[lang].poor;
  }

  document.getElementById('statCorrect').textContent = correctCount;
  document.getElementById('statWrong').textContent = wrongCount;
  document.getElementById('statPct').textContent = pct + '%';
  document.getElementById('resetBtn').style.display = 'inline-block';
  results.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function resetQuiz() {
  currentQ = 0;
  correctCount = 0;
  wrongCount = 0;
  locked = false;
  shuffle();
  document.getElementById('results').classList.remove('visible');
  document.getElementById('resetBtn').style.display = 'none';
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('progressText').textContent =
    '0 ' + ui[lang].of + ' ' + questions.length + '  \u00b7  \u2713 0  \u2717 0';
  renderQuestion(0);
}

// Init
setLang('ru');
